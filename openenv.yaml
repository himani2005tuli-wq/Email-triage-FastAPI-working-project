spec_version: 1
name: email-triage-env
version: 1.0.0
description: Email triage and prioritization environment for classifying urgency, routing, and summarizing incoming emails.
type: space
runtime: fastapi
app: app:app
port: 7860
action_space:
  task_id: string
  urgency: string
  department: string
  summary: string
  queue_position: integer
  escalate: boolean
  notes: string
observation_space:
  email_id: string
  sender: string
  subject: string
  body: string
  task_id: string
  task_name: string
  available_urgency_labels: list[string]
  available_departments: list[string]
  compliance_risk: boolean
  sender_tier: string
  business_impact: integer
  minutes_to_breach: integer
  queue_position: integer
  queue_size: integer
  step_count: integer
  max_steps: integer
tasks:
  - task_id: task-urgency
    name: Urgency Classification
    difficulty: easy
    max_steps: 10
    has_grader: true
    grader:
      enabled: true
      type: deterministic
      endpoint: /grader
      method: POST
      task_id: task-urgency
      grader_name: grade_task1
      name: grade_task1
  - task_id: task-routing
    name: Department Routing
    difficulty: medium
    max_steps: 15
    has_grader: true
    grader:
      enabled: true
      type: deterministic
      endpoint: /grader
      method: POST
      task_id: task-routing
      grader_name: grade_task2
      name: grade_task2
  - task_id: task-full-triage
    name: Full Triage
    difficulty: hard
    max_steps: 20
    has_grader: true
    grader:
      enabled: true
      type: deterministic
      endpoint: /grader
      method: POST
      task_id: task-full-triage
      grader_name: grade_task3
      name: grade_task3
graders:
  - task_id: task-urgency
    grader_name: grade_task1
    name: grade_task1
    enabled: true
    type: deterministic
    endpoint: /grader
    method: POST
  - task_id: task-routing
    grader_name: grade_task2
    name: grade_task2
    enabled: true
    type: deterministic
    endpoint: /grader
    method: POST
  - task_id: task-full-triage
    grader_name: grade_task3
    name: grade_task3
    enabled: true
    type: deterministic
    endpoint: /grader
    method: POST
tags:
  - openenv

